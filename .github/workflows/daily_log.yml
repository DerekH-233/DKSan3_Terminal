name: DKSan3 Daily Log Generator (NASA_OFFICIAL_SYNC)
on:
  schedule:
    - cron: '0 7 * * *' # 北京时间下午 3 点运行
  workflow_dispatch:

jobs:
  generate_log:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Fetch NASA Official Data
        id: apod_data
        run: |
          DATA=$(curl -s "https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY")
          TITLE_EN=$(echo $DATA | jq -r '.title')
          DESC_EN=$(echo $DATA | jq -r '.explanation | .[0:600]')
          IMG_URL=$(echo $DATA | jq -r '.url')
          
          echo "TITLE_EN=$TITLE_EN" >> $GITHUB_ENV
          echo "DESC_EN=$DESC_EN" >> $GITHUB_ENV
          echo "IMG_URL=$IMG_URL" >> $GITHUB_ENV

      - name: Translate Title via DeepSeek
        env:
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
        run: |
          # 专门让 AI 把标题翻译成硬核的中文
          TRANS_PAYLOAD=$(jq -n --arg t "$TITLE_EN" '{model: "deepseek-chat", messages: [{role: "user", content: ("将这个天文观测标题翻译成中文，要求专业且硬核，直接输出翻译结果，不要任何标点符号或解释: " + $t)}] }')
          TRANS_RES=$(curl -s https://api.deepseek.com/v1/chat/completions -H "Content-Type: application/json" -H "Authorization: Bearer $DEEPSEEK_KEY" -d "$TRANS_PAYLOAD")
          TITLE_CN=$(echo $TRANS_RES | jq -r '.choices[0].message.content')
          echo "TITLE_CN=$TITLE_CN" >> $GITHUB_ENV

      - name: Generate Log via DeepSeek
        env:
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
        run: |
          JSON_PAYLOAD=$(jq -n \
            --arg title "$TITLE_CN" \
            --arg desc "$DESC_EN" \
            --arg sys_msg "你是一个名为 DKSan3 的深空观察员，隶属于深空联合 (DSU)。语气冷酷。禁止文中出现星号*。" \
            '{
              model: "deepseek-chat",
              messages: [
                {role: "system", content: $sys_msg},
                {role: "user", content: ("今日观测目标: " + $title + "。参考背景: " + $desc + "。撰写300字日志，含坐标和损耗。禁止星号。")}
              ]
            }')

          RESPONSE=$(curl -s https://api.deepseek.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $DEEPSEEK_KEY" \
            -d "$JSON_PAYLOAD")
          
          CONTENT=$(echo $RESPONSE | jq -r '.choices[0].message.content')
          mkdir -p logs
          DATE=$(date +%Y-%m-%d)
          echo "$CONTENT" > logs/$DATE.txt
          
          # 存入清单，这次使用翻译后的中文标题
          MANIFEST="logs/manifest.json"
          if [ ! -f "$MANIFEST" ]; then echo "[]" > $MANIFEST; fi
          UPDATED_JSON=$(jq --arg date "$DATE" --arg title "$TITLE_CN" --arg img "$IMG_URL" \
            '. += [{"date": $date, "title": $title, "img": $img}] | unique_by(.date) | sort_by(.date) | reverse' $MANIFEST)
          echo "$UPDATED_JSON" > $MANIFEST

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add logs/
          git commit -m "AI_LOG_CN_SYNC: $(date +%Y-%m-%d)" || echo "No changes"
          git push
