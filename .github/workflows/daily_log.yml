name: DKSan3 Daily Log Generator (NASA_OFFICIAL_SYNC)
on:
  schedule:
    - cron: '0 7 * * *' # 北京时间下午 3 点运行
  workflow_dispatch:

jobs:
  generate_log:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Fetch NASA Official Data
        id: apod_data
        run: |
          # 直接调用 NASA 官方 API (使用 DEMO_KEY)
          # 如果以后访问频繁，建议你去 api.nasa.gov 申请一个专属 Key 替换 DEMO_KEY
          DATA=$(curl -s "https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY")
          
          # 提取数据
          TITLE=$(echo $DATA | jq -r '.title')
          DESC=$(echo $DATA | jq -r '.explanation | .[0:600]')
          IMG_URL=$(echo $DATA | jq -r '.url')
          
          # 存入环境变量
          echo "TITLE=$TITLE" >> $GITHUB_ENV
          echo "DESC=$DESC" >> $GITHUB_ENV
          echo "IMG_URL=$IMG_URL" >> $GITHUB_ENV

      - name: Generate Log via DeepSeek
        env:
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
        run: |
          JSON_PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg desc "$DESC" \
            --arg sys_msg "你是一个名为 DKSan3 的深空观察员，隶属于深空联合 (DSU)。语气冷酷。禁止星号。" \
            '{
              model: "deepseek-chat",
              messages: [
                {role: "system", content: $sys_msg},
                {role: "user", content: ("观测目标: " + $title + "。参考背景: " + $desc + "。撰写300字日志，含坐标和损耗。禁止星号。")}
              ]
            }')

          RESPONSE=$(curl -s https://api.deepseek.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $DEEPSEEK_KEY" \
            -d "$JSON_PAYLOAD")
          
          CONTENT=$(echo $RESPONSE | jq -r '.choices[0].message.content')
          mkdir -p logs
          DATE=$(date +%Y-%m-%d)
          echo "$CONTENT" > logs/$DATE.txt
          
          # --- 核心优化：把图片地址存进清单 ---
          MANIFEST="logs/manifest.json"
          if [ ! -f "$MANIFEST" ]; then echo "[]" > $MANIFEST; fi
          UPDATED_JSON=$(jq --arg date "$DATE" --arg title "$TITLE" --arg img "$IMG_URL" \
            '. += [{"date": $date, "title": $title, "img": $img}] | unique_by(.date) | sort_by(.date) | reverse' $MANIFEST)
          echo "$UPDATED_JSON" > $MANIFEST

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add logs/
          git commit -m "AI_LOG_NASA_SYNC: $(date +%Y-%m-%d)" || echo "No changes"
          git push
